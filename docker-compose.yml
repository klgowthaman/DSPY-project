version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ima_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: ima_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ima_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - chromadb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=ima_db
      - JWT_SECRET=change-this-to-a-very-long-random-secret-key
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=10080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-4o-mini
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMADB_COLLECTION=engineering_memory
      - ENCRYPTION_KEY=your-32-byte-encryption-key-here
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: ima_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  chromadb_data:
